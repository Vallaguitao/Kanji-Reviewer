<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漢字マスター — JLPT N5 Vocabulary Trainer</title>
  <meta name="description" content="Master JLPT N5 vocabulary with flashcards, quizzes, typing practice, matching games, and spaced repetition. 800+ Japanese words with progress tracking." />
  <meta name="theme-color" content="#1a1a2e" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="app-container" id="app">
    <!-- Navigation -->
    <nav class="nav" id="main-nav">
      <div class="nav-brand">
        <a href="#/dashboard" class="nav-logo">
          <span class="nav-logo-jp">漢字</span>
          <span class="nav-logo-en">マスター</span>
        </a>
      </div>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="nav-links">
        <a href="#/dashboard" class="nav-link active" id="nav-dashboard" aria-label="Dashboard">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></span>
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="#/flashcards" class="nav-link" id="nav-flashcards" aria-label="Flashcards">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="3" width="14" height="17" rx="2" opacity="0.45"/><rect x="3" y="5" width="14" height="17" rx="2"/></svg></span>
          <span class="nav-text">Flashcards</span>
        </a>
        <a href="#/quiz" class="nav-link" id="nav-quiz" aria-label="Quiz">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 10l1.5 1.5L12 8.5"/><path d="M8 16l1.5 1.5L12 14.5"/><path d="M14.5 10h3"/><path d="M14.5 16h3"/></svg></span>
          <span class="nav-text">Quiz</span>
        </a>
        <a href="#/typing" class="nav-link" id="nav-typing" aria-label="Typing Practice">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M6 9h.01M10 9h.01M14 9h.01M18 9h.01M6 13h.01M18 13h.01"/><path d="M9.5 13h5"/></svg></span>
          <span class="nav-text">Typing</span>
        </a>
        <a href="#/matching" class="nav-link" id="nav-matching" aria-label="Matching Game">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="6"/><circle cx="15" cy="12" r="6"/></svg></span>
          <span class="nav-text">Matching</span>
        </a>
        <a href="#/kanji" class="nav-link" id="nav-kanji" aria-label="Kanji Study">
          <span class="nav-icon" aria-hidden="true">漢</span>
          <span class="nav-text">Kanji</span>
        </a>
        <a href="#/srs" class="nav-link" id="nav-srs" aria-label="Spaced Repetition Review">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 12l10 5 10-5"/><path d="M2 17l10 5 10-5"/></svg></span>
          <span class="nav-text">SRS</span>
          <span class="nav-badge" id="nav-srs-badge" aria-label="Reviews due"></span>
        </a>
        <a href="#/categories" class="nav-link" id="nav-categories" aria-label="Browse Categories">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg></span>
          <span class="nav-text">Browse</span>
        </a>
      </div>

      <!-- Nav Actions -->
      <div class="nav-actions">
        <button class="nav-action-btn" id="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme (T)">
          <span class="nav-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        </button>
        <button class="nav-action-btn" id="help-toggle" aria-label="Keyboard shortcuts help" title="Help (?)">
          <span class="nav-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.9.7c0 1.8-2.4 2.3-2.4 4"/><path d="M12 17.2v.01"/></svg></span>
        </button>
        <button class="nav-action-btn" id="settings-toggle" aria-label="Settings" title="Settings">
          <span class="nav-action-icon">⚙️</span>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div id="app-content" class="view view-enter">
        <!-- Views are rendered here by app.js -->
        <div class="loading-state">
          <span class="loading-kanji">読み込み中...</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts (loaded in dependency order) -->
  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script src="theme.js"></script>
  <script src="speech.js"></script>
  <script src="vocabulary.js"></script>
  <script src="storage.js"></script>
  <script src="srs.js"></script>
  <script src="kanji.js"></script>
  <script src="export-import.js"></script>
  <script src="app.js"></script>
</body>
</html>
